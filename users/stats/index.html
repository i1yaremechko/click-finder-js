<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="images/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClickFinder - Statistics</title>
    <script type="module" crossorigin src="/click-finder-js/assets/stats-c0jdNAlV.js"></script>
    <link rel="modulepreload" crossorigin href="/click-finder-js/assets/index-QiOxLdu8.js">
    <link rel="stylesheet" crossorigin href="/click-finder-js/assets/index-CjoOXWjp.css">
  </head>
  <body>
    <div id="root">
      <div class="page">
        <header class="header">
          <div class="wrapper">
            <a href="../../index.html" style="text-decoration: none; color: inherit">
              <span class="header__logo">ClickFinder</span>
            </a>
          </div>
        </header>

        <main class="main">
          <div class="linear-progress hidden" id="global-loader">
            <div class="linear-progress__bar"></div>
          </div>

          <div id="stats-view">
            <section class="statistic">
              <div class="wrapper wrapper_stat">
                <div class="statistic__breadcrumbs">
                  <ul class="statistic__breadcrumbs-list">
                    <li class="statistic__breadcrumbs-item">
                      <a href="../../index.html" style="text-decoration: none">
                        <span class="statistic__link statistic__link_back">Main page</span>
                      </a>
                    </li>
                    <li class="statistic__breadcrumbs-separator">›</li>
                    <li class="statistic__breadcrumbs-item">
                      <span class="statistic__link">User statistics</span>
                    </li>
                  </ul>
                </div>

                <h2 class="statistic__title">Users statistics</h2>

                <div class="table-wrapper">
                  <table class="custom-table">
                    <thead>
                      <tr>
                        <th>Id</th>
                        <th>First name</th>
                        <th>Last name</th>
                        <th>Email</th>
                        <th>Gender</th>
                        <th>IP address</th>
                        <th>Total clicks</th>
                        <th>Total page views</th>
                      </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                  </table>
                </div>

                <div id="pagination-container" class="pagination"></div>
              </div>
            </section>
          </div>
        </main>

        <footer class="footer">
          <div class="wrapper">
            <a href="../../index.html" style="text-decoration: none; color: inherit">
              <span class="footer__logo">ClickFinder</span>
            </a>
            <span class="footer__rights footer__rights_reserved"
              >All rights reserved by ThemeTags</span
            >
            <span class="footer__rights">Copyrights © 2025</span>
          </div>
        </footer>
      </div>
    </div>
  </body>
</html>
